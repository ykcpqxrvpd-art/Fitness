<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HealthFlow Smart</title>
    <style>
        :root { --bg: #fdfbf7; --primary: #8b5cf6; --secondary: #10b981; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .stat-box { padding: 15px; border-radius: 18px; text-align: center; font-size: 0.9rem; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #f1f5f9; box-sizing: border-box; }
        button.add-btn { background: var(--secondary); color: white; border: none; font-weight: 700; margin-top: 10px; }
        .item-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f8fafc; font-size: 0.85rem; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; padding:20px; display:none; overflow-y:auto; }
    </style>
</head>
<body>

    <div id="setup-modal" class="modal">
        <h2 style="text-align:center;">הגדרות פרופיל 🧬</h2>
        <input type="number" id="u-age" placeholder="גיל">
        <input type="number" id="u-height" placeholder="גובה (ס״מ)">
        <input type="number" id="u-weight" placeholder="משקל (ק״ג)">
        <select id="u-goal">
            <option value="lose">חיטוב (גרעון קלורי)</option>
            <option value="maintain">שמירה על הקיים</option>
            <option value="gain">מסה (עלייה בשריר)</option>
        </select>
        <button onclick="saveProfile()" class="add-btn">שמור וחשב המלצה</button>
    </div>

    <div class="stats-grid">
        <div class="stat-box" style="background:#e0f2fe;">
            <small>נותרו להיום</small>
            <div id="rem-cal" style="font-size:1.2rem; font-weight:800;">0</div>
        </div>
        <div class="stat-box" style="background:#f3e8ff;">
            <small>חלבון (ג׳)</small>
            <div id="cur-p" style="font-size:1.2rem; font-weight:800;">0</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('morning', this)">בוקר</button>
        <button class="tab-btn" onclick="switchTab('noon', this)">צהריים</button>
        <button class="tab-btn" onclick="switchTab('evening', this)">ערב</button>
    </div>

    <div class="card">
        <h3 id="tab-title">ארוחת בוקר</h3>
        <input type="text" id="item-name" placeholder="שם הפריט (למשל: ביצה / פתיתים)">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <input type="number" id="item-val" placeholder="כמות">
            <select id="item-unit">
                <option value="unit">יחידות</option>
                <option value="spoon">כפות הגשה</option>
                <option value="cup">כוסות (240 מ״ל)</option>
                <option value="grams">גרם</option>
            </select>
        </div>
        <small style="color:#64748b;">* הערכים מחושבים אוטומטית לפי ממוצע</small>
        <button class="add-btn" onclick="addItem()">הוסף לפריטים</button>
    </div>

    <div class="card">
        <h4>פירוט הארוחה:</h4>
        <div id="item-list"></div>
    </div>

    <script>
        // בסיס נתונים קטן לממוצעים
        const foodDB = {
            "ביצה": { cal: 80, p: 7, unit: 'unit' },
            "פתיתים": { cal: 50, p: 1.5, unit: 'spoon' }, // כף אחת
            "אורז": { cal: 45, p: 1, unit: 'spoon' },
            "חזה עוף": { cal: 165, p: 31, unit: 'grams' }, // ל-100 גרם
            "מלפפון": { cal: 15, p: 0.5, unit: 'unit' },
            "עגבניה": { cal: 20, p: 1, unit: 'unit' },
            "לחם": { cal: 80, p: 3, unit: 'unit' }, // פרוסה
            "כנפיים": { cal: 90, p: 8, unit: 'unit' } // יחידה
        };

        let currentTab = 'morning';
        let profile = JSON.parse(localStorage.getItem('smart_pro'));
        let diary = JSON.parse(localStorage.getItem('smart_diary')) || { morning: [], noon: [], evening: [] };

        if (!profile) document.getElementById('setup-modal').style.display = 'block';

        function saveProfile() {
            const w = parseFloat(document.getElementById('u-weight').value);
            const h = parseFloat(document.getElementById('u-height').value);
            const a = parseInt(document.getElementById('u-age').value);
            const goal = document.getElementById('u-goal').value;

            // נוסחת Mifflin-St Jeor משופרת
            let bmr = (10 * w) + (6.25 * h) - (5 * a) - 161; 
            let tdee = bmr * 1.35; // רמת פעילות ממוצעת

            if (goal === 'lose') tdee -= 400;
            if (goal === 'gain') tdee += 300;

            // הגנה - לא לרדת מתחת ל-1200 קלוריות
            if (tdee < 1200) tdee = 1200;

            profile = { cal: Math.round(tdee), p: Math.round(w * 1.6) };
            localStorage.setItem('smart_pro', JSON.stringify(profile));
            document.getElementById('setup-modal').style.display = 'none';
            render();
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const titles = { morning: 'ארוחת בוקר', noon: 'ארוחת צהריים', evening: 'ארוחת ערב' };
            document.getElementById('tab-title').innerText = titles[tab];
            render();
        }

        function addItem() {
            const name = document.getElementById('item-name').value;
            const val = parseFloat(document.getElementById('item-val').value);
            const unit = document.getElementById('item-unit').value;

            let cal = 0, p = 0;
            const found = foodDB[name];

            if (found) {
                // חישוב חכם לפי בסיס הנתונים
                let factor = val;
                if (unit === 'grams' && found.unit !== 'grams') factor = val / 100;
                cal = found.cal * factor;
                p = found.p * factor;
            } else {
                // אם לא נמצא, נניח ערך כללי לפי יחידות (או שהמשתמש יזין ידנית בעתיד)
                cal = val * 50; 
                p = val * 2;
            }

            diary[currentTab].push({ name, cal: Math.round(cal), p: Math.round(p), val, unit });
            localStorage.setItem('smart_diary', JSON.stringify(diary));
            render();
        }

        function render() {
            if (!profile) return;
            let totalCal = 0, totalP = 0;
            
            // חישוב סך הכל יומי
            Object.values(diary).forEach(list => {
                list.forEach(i => { totalCal += i.cal; totalP += i.p; });
            });

            document.getElementById('rem-cal').innerText = profile.cal - totalCal;
            document.getElementById('cur-p').innerText = totalP + " / " + profile.p;

            // רינדור רשימת פריטים ללשונית הנוכחית
            let html = '';
            diary[currentTab].forEach(i => {
                html += `<div class="item-row">
                    <span>${i.name} (${i.val} ${i.unit === 'spoon' ? 'כפות' : 'יח\''})</span>
                    <span><strong>${i.cal} קל'</strong></span>
                </div>`;
            });
            document.getElementById('item-list').innerHTML = html || '<p style="text-align:center; color:#94a3b8;">הארוחה ריקה</p>';
        }

        render();
    </script>
</body>
</html>
