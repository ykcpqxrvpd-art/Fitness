<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitness & Nutrition Tracker</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; padding-bottom: 100px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.8rem; opacity: 0.9; }
        .list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .remove-btn { color: #ef4444; font-size: 0.8rem; border: none; background: none; width: auto; margin: 0; padding: 0 5px; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-val" id="remaining">0</span>
            <span class="stat-label">נותרו להיום</span>
        </div>
        <div class="stat-box" style="background: #10b981;">
            <span class="stat-val" id="burned">0</span>
            <span class="stat-label">נשרפו בכושר</span>
        </div>
Stat-box    </div>

    <!-- הגדרות בסיס -->
    <div class="card" id="setup-card">
        <h2>⚙️ הגדרת מטרה יומית</h2>
        <input type="number" id="daily-goal" placeholder="כמה קלוריות את רוצה לאכול ביום?" value="1800">
        <button onclick="saveGoal()">שמור מטרה</button>
    </div>

    <!-- הוספת אוכל -->
    <div class="card">
        <h2>🍎 הוספת ארוחה</h2>
        <input type="text" id="food-name" placeholder="מה אכלת?">
        <input type="number" id="food-cal" placeholder="כמה קלוריות?">
        <button onclick="addEntry('food')">הוסף לארוחה</button>
    </div>

    <!-- הוספת כושר -->
    <div class="card">
        <h2>💪 אימון וכושר</h2>
        <select id="exercise-type" onchange="toggleManualExercise()">
            <option value="manual">הזנה ידנית (קלוריות)</option>
            <option value="walking">הליכה מהירה (שעה)</option>
            <option value="running">ריצה (שעה)</option>
            <option value="pilates">פילאטיס / יוגה (שעה)</option>
            <option value="gym">אימון כוח (שעה)</option>
        </select>
        <input type="number" id="exercise-val" placeholder="כמה קלוריות שרפת?">
        <button onclick="addEntry('exercise')" style="background: #10b981;">הוסף אימון</button>
    </div>

    <!-- יומן יומי -->
    <div class="card">
        <h2>📝 יומן פעילות</h2>
        <div id="log-list"></div>
        <button onclick="clearDay()" style="background: #94a3b8; margin-top: 15px;">איפוס יום חדש</button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('fitnessData')) || {
            goal: 1800,
            entries: []
        };

        const calorieTable = {
            walking: 300,
            running: 600,
            pilates: 250,
            gym: 400
        };

        function toggleManualExercise() {
            const type = document.getElementById('exercise-type').value;
            const input = document.getElementById('exercise-val');
            if (type !== 'manual') {
                input.value = calorieTable[type];
                input.disabled = true;
            } else {
                input.value = '';
                input.disabled = false;
            }
        }

        function saveGoal() {
            data.goal = parseInt(document.getElementById('daily-goal').value);
            updateUI();
        }

        function addEntry(type) {
            let name, cals;
            if (type === 'food') {
                name = document.getElementById('food-name').value || 'ארוחה';
                cals = parseInt(document.getElementById('food-cal').value) || 0;
                if (cals === 0) return;
                data.entries.push({ name, cals: -cals, type: 'אוכל' });
            } else {
                const select = document.getElementById('exercise-type');
                name = select.options[select.selectedIndex].text;
                cals = parseInt(document.getElementById('exercise-val').value) || 0;
                if (cals === 0) return;
                data.entries.push({ name, cals, type: 'כושר' });
            }
            updateUI();
            // Clear inputs
            document.getElementById('food-name').value = '';
            document.getElementById('food-cal').value = '';
        }

        function removeEntry(index) {
            data.entries.splice(index, 1);
            updateUI();
        }

        function clearDay() {
            if (confirm('לאפס את כל הנתונים להיום?')) {
                data.entries = [];
                updateUI();
            }
        }

        function updateUI() {
            localStorage.setItem('fitnessData', JSON.stringify(data));
            let totalEaten = 0;
            let totalBurned = 0;
            let html = '';

            data.entries.forEach((entry, index) => {
                if (entry.cals < 0) totalEaten += Math.abs(entry.cals);
                else totalBurned += entry.cals;
                
                html += `
                    <div class="list-item">
                        <span><strong>${entry.type}:</strong> ${entry.name}</span>
                        <span>${Math.abs(entry.cals)} קל' 
                        <button class="remove-btn" onclick="removeEntry(${index})">✖</button></span>
                    </div>`;
            });

            const remaining = data.goal - totalEaten + totalBurned;
            document.getElementById('remaining').innerText = remaining;
            document.getElementById('burned').innerText = totalBurned;
            document.getElementById('log-list').innerHTML = html || '<p style="text-align:center; color:#94a3b8;">אין פעילות היום</p>';
            document.getElementById('daily-goal').value = data.goal;
        }

        updateUI();
    </script>
</body>
</html>
